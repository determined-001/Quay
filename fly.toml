# Deploys apps/api (the Hono API + ledger watcher worker) as one always-on
# machine — the watcher loop and cash-out poller both need a long-lived
# process, not a serverless function. The web app deploys separately to Vercel.
#
# Rename `app` below before first deploy (`fly apps create <name>` or let
# `fly launch` pick one), then set secrets:
#   fly secrets set STELLAR_NETWORK=testnet USDC_ISSUER_TESTNET=... \
#     DATABASE_URL=libsql://<db>.turso.io DATABASE_AUTH_TOKEN=... \
#     DEFAULT_SELLER_WALLET=... DEFAULT_SELLER_SECRET=... \
#     OFFRAMP=mock CORS_ORIGINS=https://<your-vercel-domain>

app = "stellar-checkout-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  API_PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
